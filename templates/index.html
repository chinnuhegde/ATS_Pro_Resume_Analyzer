<!DOCTYPE html>
<html lang="en" class="bg-slate-950 text-slate-50">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Pro | AI Resume Analysis</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style type="text/css">
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Smooth Floating Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.4;
            animation: float 15s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(40px, -60px) scale(1.1);
            }

            100% {
                transform: translate(-30px, 30px) scale(0.9);
            }
        }

        .text-gradient {
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center overflow-hidden selection:bg-blue-500/30">

    <div class="orb bg-blue-600 w-96 h-96 -top-20 -left-20"></div>
    <div class="orb bg-purple-600 w-[500px] h-[500px] -bottom-32 -right-20" style="animation-delay: -7s;"></div>

    <main class="relative z-10 w-full max-w-2xl px-6">
        <div
            class="group relative p-8 md:p-16 rounded-[40px] border border-slate-800 bg-slate-900/40 backdrop-blur-3xl shadow-2xl text-center transition-all duration-500 hover:border-slate-700 hover:shadow-blue-500/10 animate-in fade-in zoom-in-95 duration-1000">

            <div
                class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-xs font-bold uppercase tracking-widest mb-8">
                <span class="relative flex h-2 w-2">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                </span>
                Powered by Neural AI
            </div>

            <h1 class="text-4xl md:text-6xl font-black text-white leading-[1.1] tracking-tighter mb-6">
                Analyze Resumes with <br>
                <span class="text-gradient">Surgical Precision</span>
            </h1>

            <p class="text-slate-400 text-lg md:text-xl leading-relaxed mb-10 max-w-lg mx-auto">
                Drop your resume into our neural engine. Instantly discover missing skills, fix formatting, and beat the
                ATS algorithms.
            </p>

            <div class="flex flex-col items-center gap-4">
                <a href="/dashboard"
                    class="relative group/btn inline-flex items-center justify-center px-10 py-4 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold text-lg rounded-2xl transition-all shadow-xl shadow-blue-500/25 hover:shadow-purple-500/40 hover:-translate-y-1 active:scale-95 overflow-hidden">
                    <span class="relative z-10">Start AI Analysis</span>
                    <div
                        class="absolute inset-0 w-full h-full bg-gradient-to-r from-white/0 via-white/20 to-white/0 -translate-x-full group-hover/btn:animate-[shimmer_1.5s_infinite]">
                    </div>
                </a>

                <p class="text-slate-600 text-xs font-medium uppercase tracking-[0.2em]">
                    No Credit Card Required
                </p>
            </div>

            <div
                class="absolute inset-x-0 -bottom-px h-px bg-gradient-to-r from-transparent via-blue-500/20 to-transparent">
            </div>
        </div>
    </main>

    <style>
        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }
    </style>

</body>

</html>
