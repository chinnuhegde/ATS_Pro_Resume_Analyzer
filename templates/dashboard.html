{% extends "base.html" %}
{% block content %}

<div id="fullscreen-loader"
    class="hidden fixed inset-0 z-[9999] bg-slate-950/98 backdrop-blur-2xl flex-col items-center justify-center">
    <div class="relative mb-10">
        <div class="absolute inset-0 bg-blue-500 blur-3xl opacity-20 animate-pulse"></div>
        <div class="w-24 h-24 rounded-full border-2 border-blue-500/30 border-t-blue-400 animate-spin"></div>
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-4 h-4 bg-blue-400 rounded-full shadow-[0_0_20px_rgba(96,165,250,0.8)]">
        </div>
    </div>

    <h2 class="text-gradient text-4xl font-black tracking-tighter mb-4">Analyzing Resume</h2>
    <p id="dynamic-text"
        class="text-slate-400 text-lg tracking-widest uppercase font-semibold transition-opacity duration-300">
        Initializing AI Engine...
    </p>
</div>

<div class="max-w-3xl mx-auto" id="dashboard-content">
    <div
        class="relative p-8 md:p-12 rounded-3xl border border-slate-800 bg-slate-900/50 backdrop-blur-md shadow-2xl overflow-hidden">

        <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-600/10 blur-3xl rounded-full"></div>

        <div class="relative z-10">
            <h3 class="text-3xl md:text-4xl font-extrabold text-center text-white mb-8">
                Analyze Your <span class="text-gradient">Resume</span>
            </h3>

            <form id="analysis-form" method="POST" enctype="multipart/form-data" class="space-y-6">

                <div class="group relative">
                    <div id="drop-zone" onclick="document.getElementById('fileInput').click()"
                        class="cursor-pointer border-2 border-dashed border-slate-700 hover:border-blue-500/50 bg-slate-800/30 hover:bg-slate-800/50 transition-all rounded-2xl p-10 text-center group">

                        <div class="flex flex-col items-center justify-center">
                            <div
                                class="w-12 h-12 mb-4 bg-slate-700 group-hover:bg-blue-600/20 group-hover:text-blue-400 rounded-xl flex items-center justify-center text-slate-400 transition-colors">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                                    </path>
                                </svg>
                            </div>
                            <p class="text-lg font-semibold text-slate-200" id="file-main-text">Click to upload or drag
                                & drop</p>
                            <small class="text-slate-500" id="file-sub-text">Supports PDF or DOCX (Max 5MB)</small>
                        </div>
                    </div>
                    <input type="file" name="resume" id="fileInput" accept=".pdf,.docx" class="hidden" required>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-bold text-blue-400 uppercase tracking-wider ml-1">
                        Target Job Description
                    </label>
                    <textarea id="job-description" name="jd" rows="6" required
                        class="w-full bg-slate-950/50 border border-slate-700 rounded-2xl p-4 text-slate-200 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition-all"
                        placeholder="Paste the full job requirements here..."></textarea>

                    <div id="jd-error"
                        class="hidden animate-pulse flex items-center gap-2 text-red-400 text-sm font-medium mt-2">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                            <path
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" />
                        </svg>
                        Invalid job description. Please provide more detail.
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-4 rounded-2xl text-lg shadow-xl shadow-blue-500/20 transition-all transform hover:-translate-y-1 active:scale-95">
                    Start AI Analysis
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileMainText = document.getElementById('file-main-text');
    const fileSubText = document.getElementById('file-sub-text');
    const dropZone = document.getElementById('drop-zone');

    fileInput.addEventListener('change', function (e) {
        if (e.target.files.length > 0) {
            let fileName = e.target.files[0].name;
            fileMainText.innerText = "📄 " + fileName;
            fileMainText.classList.add('text-blue-400');
            fileSubText.innerText = "File selected and ready";
            dropZone.classList.add('border-blue-500/50', 'bg-blue-500/5');
        }
    });

    const loadingPhrases = [
        "Extracting resume data...",
        "Mapping skills to JD...",
        "Running semantic analysis...",
        "Formatting ATS insights...",
        "Finalizing results..."
    ];

    document.getElementById('analysis-form').addEventListener('submit', function (event) {
        const jdText = document.getElementById('job-description').value;
        const errorDiv = document.getElementById('jd-error');
        const loader = document.getElementById('fullscreen-loader');
        const dynamicText = document.getElementById('dynamic-text');

        const wordCount = jdText.trim().split(/\s+/).length;
        const hasKeywords = /experience|requirements|skills|responsibilities|role|qualifications/i.test(jdText);

        if (wordCount < 30 || !hasKeywords) {
            event.preventDefault();
            errorDiv.classList.remove('hidden');
        } else {
            errorDiv.classList.add('hidden');
            // Tailwind v4 uses flex/hidden
            loader.classList.replace('hidden', 'flex');

            let phraseIndex = 0;
            setInterval(() => {
                phraseIndex = (phraseIndex + 1) % loadingPhrases.length;
                dynamicText.classList.add('opacity-0');

                setTimeout(() => {
                    dynamicText.innerText = loadingPhrases[phraseIndex];
                    dynamicText.classList.remove('opacity-0');
                }, 300);
            }, 2500);
        }
    });
</script>
{% endblock %}
