{% extends "base.html" %}
{% block content %}

<div class="flex justify-center items-center min-h-[70vh]">
    <div class="w-full max-w-md">

        <a href="/"
            class="group flex items-center gap-2 text-slate-500 hover:text-blue-400 transition-colors mb-6 text-sm font-medium">
            <svg class="w-4 h-4 transform group-hover:-translate-x-1 transition-transform" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18">
                </path>
            </svg>
            Back to Home
        </a>

        <div
            class="relative p-8 md:p-10 rounded-3xl border border-slate-800 bg-slate-900/50 backdrop-blur-xl shadow-2xl">

            <div class="text-center mb-8">
                <h3 class="text-3xl font-extrabold text-white tracking-tight">
                    Create <span class="text-gradient">Account</span>
                </h3>
                <p class="text-slate-400 text-sm mt-2">Join ATS Pro and start optimizing</p>
            </div>

            <form method="POST" autocomplete="off" class="space-y-5">
                <div>
                    <input name="email" type="email" required autocomplete="off" placeholder="Email Address"
                        class="w-full bg-slate-950/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition-all">
                </div>

                <div class="space-y-2">
                    <input name="password" type="password" required autocomplete="new-password" minlength="8"
                        pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                        title="Password must contain at least 8 characters, including one uppercase letter, one lowercase letter, and one number."
                        placeholder="Password"
                        class="w-full bg-slate-950/50 border border-slate-700 rounded-xl px-4 py-3 text-slate-200 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-purple-500/40 focus:border-purple-500 transition-all">
                    <p class="text-[10px] text-slate-500 px-1 uppercase tracking-wider font-semibold">
                        Min. 8 chars, 1 Uppercase, 1 Number
                    </p>
                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-3.5 rounded-xl text-lg shadow-lg shadow-blue-500/20 transition-all active:scale-[0.98]">
                    Create Account
                </button>
            </form>

            <div class="text-center mt-8 pt-6 border-t border-slate-800/50">
                <p class="text-slate-400 text-sm">
                    Already have an account?
                    <a href="/login" class="text-blue-400 hover:text-blue-300 font-semibold transition-colors">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
