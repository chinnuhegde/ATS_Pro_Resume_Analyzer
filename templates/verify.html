{% extends "base.html" %}
{% block content %}

<div class="flex justify-center items-center min-h-[70vh]">
    <div class="w-full max-w-md">

        <div
            class="relative p-8 md:p-12 rounded-3xl border border-slate-800 bg-slate-900/50 backdrop-blur-xl shadow-2xl text-center">

            <div
                class="w-16 h-16 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-400 mx-auto mb-6 border border-blue-500/20">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                    </path>
                </svg>
            </div>

            <h3 class="text-3xl font-extrabold text-white tracking-tight mb-3">
                Check Your <span class="text-gradient">Email</span>
            </h3>

            <p class="text-slate-400 text-sm mb-8">
                We've sent a 6-digit verification code to your inbox. Please enter it below to secure your account.
            </p>

            <form method="POST" autocomplete="off" class="space-y-6">
                <div class="relative">
                    <input name="otp" type="text" required maxlength="6" autocomplete="off" placeholder="000000"
                        class="w-full bg-slate-950/50 border border-slate-700 rounded-2xl px-4 py-4 text-center text-4xl font-mono font-bold tracking-[0.5em] text-blue-400 placeholder:text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-blue-500 transition-all uppercase">
                </div>

                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl text-lg shadow-lg shadow-blue-500/20 transition-all active:scale-[0.98]">
                    Verify Account
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-800/50">
                <p class="text-slate-500 text-sm">
                    Didn't receive the code?
                    <button type="button"
                        class="text-blue-400 hover:text-blue-300 font-semibold transition-colors bg-transparent border-none cursor-pointer">Resend
                        OTP</button>
                </p>
            </div>

            <div class="absolute -top-10 -left-10 w-32 h-32 bg-blue-500/5 blur-3xl rounded-full"></div>
        </div>

    </div>
</div>

{% endblock %}
