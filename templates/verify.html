{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card fade-in mt-5 text-center">
            <h3 class="mb-3 font-weight-bold">Check Your <span class="text-gradient">Email</span></h3>
            <p class="mb-4 text-muted">We sent a 6-digit OTP to your email address.</p>
            <form method="POST" autocomplete="off">
                <input name="otp" type="text" class="form-control mb-4 text-center fs-3 letter-spacing-2" placeholder="------" required maxlength="6" autocomplete="off">
                <button class="btn btn-primary w-100 py-2 fs-5">Verify Account</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
